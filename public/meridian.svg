<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Globe -->
  <circle cx="16" cy="16" r="12.5" stroke="#e8dcc8" stroke-width="1.5"/>
  <!-- Longitude curve -->
  <ellipse cx="16" cy="16" rx="5" ry="12.5" stroke="#e8dcc8" stroke-width="1" opacity="0.3"/>
  <!-- Equator -->
  <line x1="3.5" y1="16" x2="28.5" y2="16" stroke="#e8dcc8" stroke-width="1" opacity="0.3"/>
  <!-- Meridian line -->
  <line x1="16" y1="3.5" x2="16" y2="28.5" stroke="#ffb74d" stroke-width="1.5" stroke-linecap="round"/>
</svg>
